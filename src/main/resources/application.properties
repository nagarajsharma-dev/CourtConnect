spring.application.name=resource-booking

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/resource_booking?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=true

# Server Configuration
server.port=8080

# Jackson: configured via JacksonConfig.java bean (Spring Boot 4 / Jackson 3 uses different property names)

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Static resources - serve uploaded photos
spring.web.resources.static-locations=classpath:/static/,file:uploads/
